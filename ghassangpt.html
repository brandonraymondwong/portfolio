<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhassanGPT — WGA Finance Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #1e1e22;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 1px;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 4px; }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
    }

    .msg.user .msg-avatar {
      background: #2a2a2e;
      color: #9ca3af;
    }

    .bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.5;
    }

    .msg.bot .bubble {
      background: #1a1a1f;
      border: 1px solid #2a2a30;
      border-bottom-left-radius: 4px;
      color: #e8e8e8;
    }

    .msg.user .bubble {
      background: #2563eb;
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #4b5563;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    #input-area {
      width: 100%;
      max-width: 720px;
      padding: 16px 24px 24px;
    }

    #input-form {
      display: flex;
      gap: 10px;
      background: #1a1a1f;
      border: 1px solid #2a2a30;
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    #input-form:focus-within {
      border-color: #3b82f6;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8e8;
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }

    #user-input::placeholder { color: #4b5563; }

    #send-btn {
      align-self: flex-end;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: #fff;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #1e293b; cursor: default; }

    #send-btn svg { width: 16px; height: 16px; }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: #374151;
      margin-top: 10px;
    }

    .system-msg {
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      margin: 4px 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">G</div>
    <div class="header-text">
      <h1>GhassanGPT</h1>
      <p><span class="status-dot"></span>WGA Finance Assistant &middot; Always available</p>
    </div>
  </header>

  <div id="chat-window">
    <p class="system-msg">Conversation started &mdash; WGA Finance Support</p>
  </div>

  <div id="input-area">
    <form id="input-form" onsubmit="handleSubmit(event)">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ask anything about WGA finances…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button type="submit" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
    <p class="disclaimer">GhassanGPT may occasionally provide limited responses. Not financial advice.</p>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const BOT_RESPONSES = ["What's the inquiry?", "Nice. Sorry to hear."];
    let responseIndex = 0;

    // Greeting
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => appendBotMessage("What's the inquiry?"), 600);
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSubmit(e);
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleSubmit(e) {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text) return;

      appendUserMessage(text);
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;

      showTyping();

      const delay = 900 + Math.random() * 600;
      setTimeout(() => {
        removeTyping();
        // First response after greeting is always "Nice. Sorry to hear."
        // then alternates
        const reply = BOT_RESPONSES[responseIndex % 2];
        responseIndex++;
        appendBotMessage(reply);
        sendBtn.disabled = false;
      }, delay);
    }

    function appendUserMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'msg user';
      msg.innerHTML = `
        <div class="bubble">${escapeHTML(text)}</div>
        <div class="msg-avatar">You</div>
      `;
      chatWindow.appendChild(msg);
      scrollBottom();
    }

    function appendBotMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      msg.innerHTML = `
        <div class="msg-avatar">G</div>
        <div class="bubble">${escapeHTML(text)}</div>
      `;
      chatWindow.appendChild(msg);
      scrollBottom();
    }

    let typingEl = null;
    function showTyping() {
      typingEl = document.createElement('div');
      typingEl.className = 'msg bot';
      typingEl.id = 'typing';
      typingEl.innerHTML = `
        <div class="msg-avatar">G</div>
        <div class="bubble" style="padding:0">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatWindow.appendChild(typingEl);
      scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function scrollBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
